<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Gradient cho chữ T và P -->
    <linearGradient id="tpGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0A5BFF" />
    </linearGradient>
    
    <!-- Shadow cho máy bay giấy -->
    <filter id="planeShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#0D1B2A" flood-opacity="0.15" />
    </filter>
  </defs>

  <g transform="translate(10, 10)">
    <!-- BIỂU TƯỢNG TP VÀ MÁY BAY GIẤY -->
    <!-- Chữ T (Cánh trái) -->
    <path d="M 50,40 L 220,40 L 195,95 L 140,95 L 90,210 L 30,210 Z" fill="url(#tpGradient)" />
    
    <!-- Chữ P (Vòng cánh phải) -->
    <path d="M 140,95 L 175,95 C 240,95 270,120 255,160 C 240,195 200,210 145,210 L 90,210 L 115,155 L 155,155 C 185,155 200,148 208,132 C 215,118 205,110 180,110 L 148,110 Z" fill="url(#tpGradient)" />

    <!-- Máy bay giấy bay qua ở giữa (3D Folded Paper Plane) -->
    <g filter="url(#planeShadow)" transform="translate(30, -5)">
      <!-- Cánh trái dưới -->
      <polygon points="120,135 150,140 140,158" fill="#D1D5DB" />
      <!-- Thân máy bay chính (mặt dưới/tối) -->
      <polygon points="80,128 190,95 120,135" fill="#E5E7EB" />
      <!-- Cánh phải lớn (mặt sáng) -->
      <polygon points="80,128 190,95 150,110" fill="#FFFFFF" />
      <!-- Nếp gấp thân trên -->
      <polygon points="120,135 190,95 150,110" fill="#F3F4F6" />
    </g>

    <!-- CHỮ THƯƠNG HIỆU TECHPILOT -->
    <!-- "Tech" (Màu Navy đậm/Trắng trong darkmode sẽ handle bằng CSS/filter) -->
    <text x="300" y="145" font-family="'Inter', 'Be Vietnam Pro', sans-serif" font-weight="800" font-size="76" fill="#0D1B2A" letter-spacing="-1">Tech</text>
    <!-- "Pilot" (Màu Xanh chủ đạo) -->
    <text x="475" y="145" font-family="'Inter', 'Be Vietnam Pro', sans-serif" font-weight="800" font-size="76" fill="#0A5BFF" letter-spacing="-1">Pilot</text>
    
    <!-- Slogan phụ phía dưới -->
    <text x="305" y="195" font-family="'Inter', 'Be Vietnam Pro', sans-serif" font-weight="600" font-size="19" fill="#6B7280" letter-spacing="7">TECHNOLOGY • TRUST • FUTURE</text>
  </g>
</svg>
