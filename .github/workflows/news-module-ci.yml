name: News Module CI

on:
  push:
    branches:
      - feature/hieu-news
      - main
    paths:
      - 'app/**'
      - 'config/**'
      - 'database/**'
      - 'scripts/**'
      - 'public/assets/css/news.css'
      - 'public/assets/js/news.js'
      - 'tests/**'
      - 'checkpoints/**'
      - 'docs/workflow/**'
      - '.opencode/**'
      - 'AGENTS.md'
      - '.github/workflows/news-module-ci.yml'
  pull_request:
    branches:
      - feature/hieu-news
      - main
    paths:
      - 'app/**'
      - 'config/**'
      - 'database/**'
      - 'scripts/**'
      - 'public/assets/css/news.css'
      - 'public/assets/js/news.js'
      - 'tests/**'
      - 'checkpoints/**'
      - 'docs/workflow/**'
      - '.opencode/**'
      - 'AGENTS.md'
      - 'tests/workflow/**'
      - '.github/workflows/news-module-ci.yml'

jobs:
  php-tests:
    name: PHP Lint & Unit Regression Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql
          coverage: none

      - name: PHP Syntax Lint
        run: |
          find app config scripts tests -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run MarkdownRenderer Test
        run: php tests/MarkdownRendererTest.php

      - name: Run EditorialExperience Test
        run: php tests/EditorialExperienceTest.php

      - name: Run Absolute URL Test
        run: php tests/test_absolute_url.php

      - name: Run News Module Regression Test
        run: php tests/NewsModuleRegressionTest.php

      - name: Run Admin Post Validation Test
        run: php tests/AdminPostValidationTest.php

      - name: Run UploadService Image Lifecycle Test
        run: php tests/UploadServiceImageLifecycleTest.php

  db-integration:
    name: Database Search & Persistence Integration Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: techpilot
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql
          coverage: none

      - name: Setup Local CI Database Configuration
        run: |
          cat << 'PHP' > config/database.local.php
          <?php
          return [
              'host' => '127.0.0.1',
              'port' => 3306,
              'database' => 'techpilot',
              'username' => 'root',
              'password' => 'root',
              'charset' => 'utf8mb4',
          ];
          PHP

      - name: Import Database Schema
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -proot techpilot < database/schema.sql

      - name: Run Non-Destructive Migrations
        run: php scripts/database/migrate.php

      - name: Run Database Runtime Safety Test
        run: php tests/DatabaseRuntimeSafetyTest.php

      - name: Run Seeder Safety Integration Test
        run: php tests/SeederSafetyIntegrationTest.php

      - name: Run Safe News Seeder Dry-Run
        run: php scripts/database/seed-news.php --dry-run

      - name: Run Safe News Seeder Seeding
        run: php scripts/database/seed-news.php --repair-placeholders

      - name: Run Author Cases Database Test
        run: php tests/test_author_cases.php

      - name: Run News Database Integration Test
        run: php tests/NewsSearchIntegrationTest.php

      - name: Upload Test Evidence Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: news-module-test-evidence
          path: |
            docs/reviews/evidence/news-final-gate/*.txt

  checkpoint-gate:
    name: Checkpoint Gate Validator
    needs: [php-tests, db-integration]
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Exact PR Head SHA
        if: github.event_name == 'pull_request'
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          echo "Checked out PR head SHA: $(git rev-parse HEAD)"

      - name: Report Checkpoint State
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Base SHA: ${{ github.event.pull_request.base.sha || github.event.before || 'unknown' }}"
          echo "Head SHA: $(git rev-parse HEAD)"
          echo "Branch: $(git branch --show-current)"
          echo "--- STATE.json ---"
          cat checkpoints/STATE.json 2>/dev/null || echo "STATE.json not found"

      - name: Validate Contract
        run: scripts/workflow/validate-contract

      - name: Run Workflow Regression Tests
        run: bash tests/workflow/test_control.sh

      - name: Check Changed Files Against Allowlist
        run: scripts/workflow/check-changed-files

      - name: Scan Forbidden Patterns
        run: scripts/workflow/scan-forbidden-patterns

      - name: Verify Review SHA
        run: scripts/workflow/verify-review-sha

      - name: Collect Test Evidence
        run: |
          mkdir -p checkpoints/CP03/evidence
          scripts/workflow/collect-test-evidence

      - name: Upload Checkpoint Evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkpoint-cp3-evidence
          path: |
            checkpoints/CP03/evidence/
